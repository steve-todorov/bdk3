apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: app-staging
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: app
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: fluxcdbot
        email: fluxcdbot@users.noreply.github.com
      messageTemplate: |
        chore(staging): bump image
        {{ range $filename, $changes := .Changed.FileChanges -}}
        - {{ $filename }}:
        {{ range $changes -}}
          - {{ .OldValue }} -> {{ .NewValue }}
        {{ end -}}
        {{ end -}}
    push:
      branch: main
  update:
    path: ./deploy/overlays/staging
    strategy: Setters
