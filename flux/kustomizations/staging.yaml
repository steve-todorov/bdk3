apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-staging
  namespace: flux-system
spec:
  sourceRef:
    kind: GitRepository
    name: app
  path: ./deploy/overlays/staging
  targetNamespace: OWNER-REPO-app-staging
  prune: true
  interval: 1m
  postBuild:
    substitute:
      APP_ENV: staging
      HOSTNAME: staging.local.domain
      DATABASE_URL: "postgres://app:stub-pw@staging.local.domain:5432/app"
