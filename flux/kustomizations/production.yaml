apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-production
  namespace: flux-system
spec:
  sourceRef:
    kind: GitRepository
    name: app
  path: ./deploy/overlays/production
  targetNamespace: OWNER-REPO-app-production
  prune: true
  interval: 1m
  postBuild:
    substitute:
      APP_ENV: production
      HOSTNAME: production.local.domain
      DATABASE_URL: "postgres://app:stub-pw@production.local.domain:5432/app"
