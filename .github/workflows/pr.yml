name: pr
on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths-ignore:
      - 'deploy/**'

concurrency:
  group: pr-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    if: contains(github.event.pull_request.labels.*.name, 'preview') && github.actor != 'fluxcdbot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image ref
        id: img
        shell: bash
        run: |
          OWNER_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          TAG="pr-${{ github.event.number }}-${{ github.event.pull_request.head.sha }}"
          echo "image=ghcr.io/${OWNER_REPO}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.img.outputs.image }}:${{ steps.img.outputs.tag }}

      - uses: ./.github/actions/stub-neon-provision
        with:
          env_name: preview
          env_id: pr-${{ github.event.number }}
