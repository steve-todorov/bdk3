name: production
on:
  push:
    branches: [production]
    paths-ignore:
      - 'deploy/**'

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    if: github.actor != 'fluxcdbot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image ref
        id: img
        shell: bash
        run: |
          OWNER_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          TAG="production-${{ github.run_number }}-$(date -u +%s)"
          echo "image=ghcr.io/${OWNER_REPO}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.img.outputs.image }}:${{ steps.img.outputs.tag }}

      - uses: ./.github/actions/stub-neon-provision
        with:
          env_name: production
          env_id: production
